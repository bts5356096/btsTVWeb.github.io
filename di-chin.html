    <td>地清法師<br> <p>地清法師透過淨土法門來闡述信佛的利益，法師針對淨業往生，消業往生，帶業往生等都有獨到的說法。另外，法師也提供一些修行上的方便法門，供蓮友同參。</p>
      <p>引用阿彌陀佛經所記載的經文，來解說持名念佛如何得度？念佛可以解冤，也可以圓滿，可以廣結善緣，今生就可以得度，不必等到往生。多念佛才能與佛相應，相應才容易得度。</p></td>
