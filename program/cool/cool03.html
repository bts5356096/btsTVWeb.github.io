    <td width="68%" height="198"> <p style="margin-top: 5; margin-bottom: 5"><b><font size="5" color="#FF9900">志心法師　</font><font color="#000080" size="3">台中法華寺</font></b></p>
      <p align="left" style="margin-top: 5; margin-bottom: 5; line-height:150%">學佛的益處很多，知苦解苦、了生脫死、增長智慧、增福進德、改善生活、淨化社會、化世界為和平。但是，如何學佛呢？</p>
      <p align="left" style="margin-top: 5; margin-bottom: 5; line-height:150%">如何正確且自在的學佛呢？</p>
      <p align="left" style="margin-top: 5; margin-bottom: 5; line-height:150%">如何真正認識自己，找到生命的方向，能解決自己的痛苦和疑惑？且聆聽志心法師悲心開示，自有一番體悟。
