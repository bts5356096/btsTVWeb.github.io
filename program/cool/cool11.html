    <td width="406" rowspan="2" valign="top"><p><br>
        <font color="#FF9900" size="+2"><strong>聖佶法師</strong></font></p>
      <p>&nbsp;</p>
      <p><font color="#0000FF" size="+1"><strong>放生具足六波羅蜜 </strong></font></p>
      <p><em><font color="#9933FF">近期播出 敬請期待</font></em></p>
      <p>「放生」，這個名詞很有爭議，因為曲解意義所以有爭議，《金剛經》上來講六波羅蜜就是發大菩提心，而發菩提心就是學作菩薩，聖佶法師表示，放生須具足六波羅蜜。何謂「六波羅蜜」，一是布施，第二持戒，第三忍辱，第四精進，第五禪定，第六般若。為什麼放生要具足這六項功德才會圓滿呢？聖佶法師在節目中有詳細說明，節目近期播出，敬請耐心期待。</p></td>
