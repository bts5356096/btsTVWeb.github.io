    <td width="68%" height="198"> <p style="margin-top: 5; margin-bottom: 5"><b><font size="5" color="#FF9900">心祥法師</font></b></p>
      <p class="MsoBodyTextIndent2" style="margin-top: 5; margin-bottom: 5"><span style="mso-ascii-font-family: Times New Roman">每個人都有一個「生涯」。有些人不幸出生不久就短命夭折而死，他只有很短的生涯；有些人則長命超過百歲，有一個比常人更長的生涯。一般人大約活個七八十年，有個不算太短的生涯。每個人都有自己的生涯，但是每個人的生涯都不一樣，世界上找不到兩個生涯完全相同的人。張三一生的歷程是專屬於張三的生涯，這個生涯必然不同於李四，而且在古今中外，人類的過去未來，也絕不可能出現一個與張三有完全相同生涯的人。</span></p>
      <p class="MsoBodyTextIndent2" style="margin-top: 5; margin-bottom: 5"><span style="mso-ascii-font-family: Times New Roman">如何增進幸福的人生？且聽法師用佛學的角度，引領我們走向幸福人生之路。</span> 
    </td>
