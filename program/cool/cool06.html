    <td width="68%"> <p style="margin-top: 5; margin-bottom: 5"><b><font size="5" color="#FF9900">淨珠法師</font></b></p>
      <p style="margin-top: 5; margin-bottom: 5"><font color="#008080">慈源禪寺當家／當家</font></p>
      <p style="margin-top: 5; margin-bottom: 5"><font color="#008080">高雄元亨佛學院／教務主任</font></p>
      <p style="margin-top: 5; margin-bottom: 5"><font color="#008080">淨覺佛學院／講師</font></p>
      <p style="margin-top: 5; margin-bottom: 5"><font color="#008080">金倫佛學教育學院／講師</font></p>
      <p style="margin-top: 5; margin-bottom: 5"><font color="#000080">淨珠法師出生於台南玉井，就讀於基隆月眉山正覺學苑，並於學苑中圓頂出家，之後就讀太虛佛學院、福嚴佛學院、常覺法師指導「成唯識論」等。其間曾返月眉山華文佛學院任教職、並至日本京都佛教大學進修。<br>
        </font></p></td>
